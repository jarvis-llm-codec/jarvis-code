name: macOS/Linux install smoke

on:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "chore/**"
      - "docs/**"
  pull_request:

jobs:
  posix-install-smoke:
    name: ${{ matrix.os }} install smoke
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Static syntax checks
        run: |
          sh -n install.sh
          sh -n jarvis.sh
          sh -n uninstall.sh
          python -m py_compile scripts/jarvis-launcher.py scripts/jarvis-doctor.py

      - name: Install without preloading embedding model
        run: |
          set -eu
          install_dir="$RUNNER_TEMP/jarvis-code-install"
          bin_dir="$RUNNER_TEMP/jarvis-code-bin"
          rm -rf "$install_dir" "$bin_dir"
          JARVIS_CODE_INSTALL_DIR="$install_dir" \
          JARVIS_CODE_BIN_DIR="$bin_dir" \
          JARVIS_CODE_NO_MODEL_PRELOAD=1 \
          ./install.sh
          "$bin_dir/jarvis" --help
          "$bin_dir/jarvis" doctor --skip-sidecar
          port=18765
          runtime="$install_dir/data/ci-sidecar-runtime.json"
          JARVIS_SIDECAR_PORT="$port" \
          JARVIS_SIDECAR_URL="http://127.0.0.1:$port" \
          JARVIS_SIDECAR_RUNTIME="$runtime" \
          PYTHONPATH="$install_dir/sidecar" \
          "$install_dir/sidecar/.venv/bin/python" -m jarvis_sidecar > "$RUNNER_TEMP/jarvis-sidecar.log" 2>&1 &
          sidecar_pid=$!
          trap 'kill "$sidecar_pid" 2>/dev/null || true; wait "$sidecar_pid" 2>/dev/null || true' EXIT
          i=0
          until curl -fsS "http://127.0.0.1:$port/health" > "$RUNNER_TEMP/jarvis-sidecar-health.json"; do
            if ! kill -0 "$sidecar_pid" 2>/dev/null; then
              cat "$RUNNER_TEMP/jarvis-sidecar.log"
              exit 1
            fi
            i=$((i + 1))
            if [ "$i" -ge 40 ]; then
              cat "$RUNNER_TEMP/jarvis-sidecar.log"
              exit 1
            fi
            sleep 0.5
          done
          python - <<'PY'
          import json
          import os

          path = os.path.join(os.environ["RUNNER_TEMP"], "jarvis-sidecar-health.json")
          with open(path, encoding="utf-8") as fh:
              payload = json.load(fh)
          assert payload.get("ok") is True, payload
          assert payload.get("service") == "jarvis-jlc-sidecar", payload
          PY
